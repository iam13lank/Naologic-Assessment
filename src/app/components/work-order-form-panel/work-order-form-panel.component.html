<div class="panel-wrapper" [class.open]="panelOpen" (click)="close()">
  <div class="panel" (click)="$event.stopPropagation()">

    <div class="panel-header">
      <div class="panel-title-block">
        <h2>Work Order Details</h2>
        <p class="panel-subtitle">
          Specify the dates, name and status for this order.
        </p>
      </div>

      <div class="panel-actions">
        <button class="btn btn-secondary" (click)="close()">Cancel</button>
        <button class="btn btn-primary" (click)="submit()">
          {{ workOrderForm ? 'Save' : 'Create' }}
        </button>
      </div>
    </div>

    <form [formGroup]="form" class="panel-body">

      <!-- NAME -->
      <div class="form-group">
        <label for="name">Work Order Name</label>
        <input
          id="name"
          formControlName="name"
          type="text"
          class="text-input  typing-enabled"
          placeholder="Acme Inc."
        />

        <!-- REQUIRED ERROR -->
        <div *ngIf="form.get('name')?.touched && form.get('name')?.errors?.['required']"
             class="error">
          Work order name is required.
        </div>
      </div>

      <!-- STATUS -->
      <div class="form-group">
        <label for="status">Status</label>

        <ng-select
          formControlName="status"
          [items]="statusOptions"
          class="status-select"
          bindLabel=""
          bindValue=""
        >
          <ng-template ng-label-tmp let-item="item">
            <span class="status-pill" [class]="item">{{ item }}</span>
          </ng-template>

          <ng-template ng-option-tmp let-item="item">
            <span class="status-option">{{ item }}</span>
          </ng-template>
        </ng-select>
      </div>

      <!-- START DATE -->
      <div class="form-group">
        <label for="start">Start date</label>

        <div class="datepicker-wrapper">
          <input
            id="start"
            class="text-input date-input"
            formControlName="start"
            [placeholder]="todayPlaceholder"
            readonly
            [value]="formatStruct(form.value.start)"
            readonly
            (click)="openStart()"
          />

          <div class="datepicker-popup" *ngIf="startOpen" (click)="$event.stopPropagation()">
            <ngb-datepicker
              [navigation]="'select'"
              [displayMonths]="1"
              [showWeekNumbers]="false"
              (dateSelect)="onStartSelect($event)"
            ></ngb-datepicker>
          </div>
        </div>
      </div>

      <!-- END DATE -->
      <div class="form-group">
        <label for="end">End date</label>

        <div class="datepicker-wrapper">
          <input
            id="end"
            class="text-input date-input"
            formControlName="end"
            [placeholder]="nextWeekPlaceholder"
            [value]="formatStruct(form.value.end)"
            readonly
            (click)="openEnd()"
          />

          <div class="datepicker-popup" *ngIf="endOpen" (click)="$event.stopPropagation()">
            <ngb-datepicker
              [navigation]="'select'"
              [displayMonths]="1"
              [showWeekNumbers]="false"
              (dateSelect)="onEndSelect($event)"
            ></ngb-datepicker>
          </div>
        </div>

        <div *ngIf="form.errors?.['overlap']" class="error">
          This work order overlaps with an existing one.
        </div>
      </div>


    </form>

  </div>
</div>
