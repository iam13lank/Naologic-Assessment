<div class="timeline-container" [style.--cell-width.px]="getCellWidth()">
  <div class = "work-center-column">
    <h3>Work Center</h3>
    <ul>
      <li 
        *ngFor="let center of workCenters"
        [class.hovered]="selectedWorkCenterId === center.docId"
      >
        {{ center.data.name }}
      </li>
    </ul>
  </div>
  <div class="timeline-header">
    <div class="cell" *ngFor="let cell of visibleCells">{{ cell.label }}</div>
    <div class="current-month-pill" [ngStyle]="getCurrentMonthStyle()">
      Current month
    </div>
  </div>

  <div class="timeline-body">
    <div class="timeline-row" *ngFor="let wc of workCenters">
      <div 
        class="cell"
        *ngFor="let cell of visibleCells; let i = index"
        (mouseenter)="onCellHover(cell, i, wc)"
        (mouseleave)="onCellLeave()"
        (click)="onCellClick(cell, wc)"
      ></div>

      <app-work-order-bar
        *ngFor="let order of getWorkorderByCenterId(wc.docId)"
        [order]="order"
        [visibleCells]="visibleCells"
        [timescale]="timescale"
        (edit)="onBarEdit(order)"
        (delete)="onBarDelete(order)"
      ></app-work-order-bar>




    </div>
  </div>
</div>
