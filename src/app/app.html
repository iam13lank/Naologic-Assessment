<div class =  "Page-header">
  <h1>Work Orders</h1>
  <div class="timescale-zoom-controls">
  <ng-select
    [items]="['day', 'week', 'month']"
    [(ngModel)]="timescale"
    (change)="onTimescaleChange(timescale)"
    bindLabel=""
    placeholder="TimeScale: "
    class="timescale-select"
  >
  </ng-select>
</div>

</div>

<div class = "Main-content">  
  <app-timeline [timescale]="timescale"></app-timeline>
  <app-work-order-form-panel></app-work-order-form-panel>
</div>
