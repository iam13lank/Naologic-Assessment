<div class =  "Page-header">
  <h1>Work Orders</h1>
  <div class = "timescale-zoom-controls">
    <label>Timescale:</label>
    <select [(ngModel)]="timescale" (change)="onTimescaleChange(timescale)">
      <option value="day">Day</option>
      <option value="week">Week</option>
      <option value="month">Month</option>
    </select>
  </div>
</div>

<div class = "Main-content">
  <app-work-center-bar></app-work-center-bar>
  <app-timeline [timescale]="timescale"></app-timeline>
  <app-work-order-form-panel></app-work-order-form-panel>
</div>
