<!-- NAOLOGIC TOP BAR -->
<div class="naologic-topbar">
  <img src="assets/naologic-logo.webp" alt="Naologic Logo" class="naologic-logo" />
</div>


<!-- PAGE HEADER -->
<div class="Page-header">
  <h1>Work Orders</h1>

  <div class="timescale-zoom-controls">
    <div class = "timescale-zoom-controls-label"><span>Timescale</span></div>
    <ng-select
      [items]="['day', 'week', 'month']"
      [(ngModel)]="timescale"
      (change)="onTimescaleChange(timescale)"
      bindLabel=""
      placeholder=""
      class="timescale-select"
    ></ng-select>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="Main-content">  
  <app-timeline
    [timescale]="timescale"
    (createAtDate)="formPanel.openCreatePanel($event)"
    (editOrder)="formPanel.openEditPanel($event)"
  ></app-timeline>

  <app-work-order-form-panel #formPanel></app-work-order-form-panel>
</div>
